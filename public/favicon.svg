<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff2d55"/>
      <stop offset="100%" stop-color="#e81e3f"/>
    </linearGradient>
    <clipPath id="clip">
      <circle cx="256" cy="256" r="256"/>
    </clipPath>
  </defs>
  <!-- Background -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <!-- Symmetric mandala pattern -->
  <g clip-path="url(#clip)" opacity="0.1" fill="none" stroke="white" stroke-width="1.5">
    <!-- Concentric circles -->
    <circle cx="256" cy="256" r="60"/>
    <circle cx="256" cy="256" r="110"/>
    <circle cx="256" cy="256" r="160"/>
    <circle cx="256" cy="256" r="210"/>
    <circle cx="256" cy="256" r="250"/>
    <!-- 12 radial lines (like a clock) -->
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="37" y1="37" x2="475" y2="475"/>
    <line x1="475" y1="37" x2="37" y2="475"/>
    <line x1="256" y1="0" x2="0" y2="256" transform="rotate(15,256,256)"/>
    <line x1="256" y1="0" x2="0" y2="256" transform="rotate(-15,256,256)"/>
    <line x1="256" y1="0" x2="512" y2="256" transform="rotate(15,256,256)"/>
    <line x1="256" y1="0" x2="512" y2="256" transform="rotate(-15,256,256)"/>
    <!-- Petal shapes at 8 directions -->
    <ellipse cx="256" cy="120" rx="24" ry="50" transform="rotate(0,256,256)"/>
    <ellipse cx="256" cy="120" rx="24" ry="50" transform="rotate(45,256,256)"/>
    <ellipse cx="256" cy="120" rx="24" ry="50" transform="rotate(90,256,256)"/>
    <ellipse cx="256" cy="120" rx="24" ry="50" transform="rotate(135,256,256)"/>
    <ellipse cx="256" cy="120" rx="24" ry="50" transform="rotate(180,256,256)"/>
    <ellipse cx="256" cy="120" rx="24" ry="50" transform="rotate(225,256,256)"/>
    <ellipse cx="256" cy="120" rx="24" ry="50" transform="rotate(270,256,256)"/>
    <ellipse cx="256" cy="120" rx="24" ry="50" transform="rotate(315,256,256)"/>
    <!-- Diamond shapes at 4 directions -->
    <rect x="236" y="40" width="40" height="40" rx="4" transform="rotate(45,256,60)"/>
    <rect x="236" y="40" width="40" height="40" rx="4" transform="rotate(45,256,60) rotate(90,256,256)"/>
    <rect x="236" y="40" width="40" height="40" rx="4" transform="rotate(45,256,60) rotate(180,256,256)"/>
    <rect x="236" y="40" width="40" height="40" rx="4" transform="rotate(45,256,60) rotate(270,256,256)"/>
    <!-- Small dots ring -->
    <circle cx="256" cy="76" r="5" fill="white" stroke="none"/>
    <circle cx="256" cy="76" r="5" fill="white" stroke="none" transform="rotate(30,256,256)"/>
    <circle cx="256" cy="76" r="5" fill="white" stroke="none" transform="rotate(60,256,256)"/>
    <circle cx="256" cy="76" r="5" fill="white" stroke="none" transform="rotate(90,256,256)"/>
    <circle cx="256" cy="76" r="5" fill="white" stroke="none" transform="rotate(120,256,256)"/>
    <circle cx="256" cy="76" r="5" fill="white" stroke="none" transform="rotate(150,256,256)"/>
    <circle cx="256" cy="76" r="5" fill="white" stroke="none" transform="rotate(180,256,256)"/>
    <circle cx="256" cy="76" r="5" fill="white" stroke="none" transform="rotate(210,256,256)"/>
    <circle cx="256" cy="76" r="5" fill="white" stroke="none" transform="rotate(240,256,256)"/>
    <circle cx="256" cy="76" r="5" fill="white" stroke="none" transform="rotate(270,256,256)"/>
    <circle cx="256" cy="76" r="5" fill="white" stroke="none" transform="rotate(300,256,256)"/>
    <circle cx="256" cy="76" r="5" fill="white" stroke="none" transform="rotate(330,256,256)"/>
  </g>
  <!-- Bold Y letter -->
  <g transform="translate(256,235)">
    <path d="M-65,-85 L0,-5 L65,-85" fill="none" stroke="white" stroke-width="38" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="0" y1="-5" x2="0" y2="82" stroke="white" stroke-width="38" stroke-linecap="round"/>
  </g>
</svg>
