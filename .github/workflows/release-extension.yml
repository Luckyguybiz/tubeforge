name: Build Chrome Extension ZIP

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create extension ZIP
        run: |
          cd chrome-extension
          zip -r ../tubeforge-chrome-extension.zip .
          cd ..
          echo "ZIP contents:"
          unzip -l tubeforge-chrome-extension.zip

      - name: Upload to release v1.0.0
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.0
          files: tubeforge-chrome-extension.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tubeforge-chrome-extension
          path: tubeforge-chrome-extension.zip
